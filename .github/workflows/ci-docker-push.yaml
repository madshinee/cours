name: CI Docker Build & Push

on:
  push:
    branches:
      - lab-docker

jobs:
  test-runner:
    runs-on: self-hosted
    
    steps:
      - name: Test du runner
        run: echo $env:COMPUTERNAME

  docker:
    runs-on: ubuntu-latest

    #environment: dev

    env:
      IMAGE_NAME: ci-html-demo
      IMAGE_TAG: latest
      DOCKER_REGISTRY: madara3

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build de l'image Docker
        run: |
          docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Test de l'image Docker
        run: |
          docker image ls $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG 

      - name: Push de l'image Docker
        run: |
          docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
